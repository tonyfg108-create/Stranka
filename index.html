<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtipná stránka</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5rem 0;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        p {
            color: #34495e;
            line-height: 1.6;
            font-size: 1.1rem;
        }
        .funny-text {
            color: #e74c3c;
            font-weight: bold;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Podívejte se, jak je vše krásně jednoduché v dnešní době!</h1>
        <img src="https://i.imgur.com/5J0kZ7l.jpg" alt="Vtipný obrázek kočky v brýlích">
        <p class="funny-text">Tento obrázek je tak vtipný, že se budete smát až k slzám!</p>
        <p>Ale vážně, někdy je nejlepší jednoduchost - čistý design, jasný obsah a dobrý úsměv. To je to, co dělá web krásným.</p>
    </div>
</body>
</html>
